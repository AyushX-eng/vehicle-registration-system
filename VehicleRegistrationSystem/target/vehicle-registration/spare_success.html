<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Spare Part Registered</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body {
            background: linear-gradient(to right, #e0f7fa, #e1f5fe);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .success-box {
            background-color: #ffffff;
            border-left: 6px solid #4CAF50;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
        }

        .success-box h2 {
            color: #4CAF50;
            font-size: 22px;
            margin-bottom: 20px;
        }

        .success-box p {
            font-size: 16px;
            margin-bottom: 30px;
            color: #333;
        }

        .success-box a {
            display: inline-block;
            padding: 12px 30px;
            background-color: #2196F3;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            transition: background-color 0.3s ease;
            font-weight: 500;
        }

        .success-box a:hover {
            background-color: #0b7dda;
        }
    </style>
</head>
<body>
    <div class="success-box">
        <h2>✅ Spare Part Registered Successfully!</h2>
        <p>Your spare part entry has been recorded.</p>
        <a href="index.html">Return to Home</a>
    </div>
</body>
</html>
